# GPU launch:  docker compose -f compose.cuda.yaml up --build
# Requires the NVIDIA Container Toolkit on the host. Then open http://localhost:8787
services:
  noctra:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: noctra:cuda
    ports:
      - "8787:8787"
    environment:
      NOCTRA_HOST: "0.0.0.0"
      NOCTRA_MODEL: "${NOCTRA_MODEL:-large-v3}"
      NOCTRA_LANGUAGE: "${NOCTRA_LANGUAGE:-ru}"
      NOCTRA_DEVICE: "${NOCTRA_DEVICE:-cuda}"
      NOCTRA_COMPUTE_TYPE: "${NOCTRA_COMPUTE_TYPE:-float16}"
    volumes:
      # Put audio here on the host; reference it as /data/<file> in the UI.
      - ./audio:/data
      # Persist downloaded Whisper models across restarts.
      - model-cache:/root/.cache/huggingface
      # Persist the SQLite queue/history across restarts.
      - noctra-data:/app/.noctra
      # Keep logs on the host.
      - ./.noctra_logs:/app/.noctra_logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  model-cache:
  noctra-data:
