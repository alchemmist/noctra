<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noctra Script</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div>
        <h1>Noctra Script</h1>
        <div class="subtitle">
          Добавляйте пути к аудиофайлам или папкам, затем запускайте очередь одной кнопкой.
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span class="num" id="pending">0</span><span class="label">pending</span></div>
        <div class="stat"><span class="num" id="processing">0</span><span class="label">processing</span></div>
        <div class="stat"><span class="num" id="done">0</span><span class="label">done</span></div>
        <div class="stat"><span class="num" id="failed">0</span><span class="label">failed</span></div>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <div class="pad">
          <h2>Новая очередь</h2>
          <textarea id="paths" placeholder="/home/user/audio1.m4a&#10;/home/user/audio2.mp3&#10;/home/user/folder-with-audio"></textarea>
          <div class="row">
            <button class="primary" id="enqueue" type="button">Добавить</button>
            <button class="primary" id="start-queue" type="button">Старт</button>
          </div>
          <div class="hint">Поддерживаются и файлы, и папки. После старта очередь идет сама.</div>
          <div class="footer-note" id="result"></div>
        </div>
      </section>

      <section class="card">
        <div class="pad">
          <h2>Очередь</h2>
          <div class="queue" id="queue"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
