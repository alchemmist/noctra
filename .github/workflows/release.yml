name: Release

# Triggered by `make release`, which pushes a v* tag. Extracts the matching
# section from CHANGELOG.md and publishes it as a GitHub Release. The Docker
# workflow builds & pushes the image for the same tag in parallel.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release_notes.md
          echo "----- release notes for $version -----"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Noctra ${{ github.ref_name }}
          body_path: release_notes.md
